global:
  scrape_interval: 3s
  evaluation_interval: 3s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node-api'
    metrics_path: /observability/metrics
    static_configs:
      - targets: ['server:3000']

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres_exporter:9187']

rule_files:
  - postgres_alerts.yml
