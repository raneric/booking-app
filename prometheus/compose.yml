services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'

    ports:
      - '9090:9090'
    networks:
      - local-shared-network

  postgres_exporter:
    image: prometheuscommunity/postgres-exporter
    container_name: postgres_exporter
    environment:
      DATA_SOURCE_NAME: 'postgresql://odoo_stocks:iloCGIdiMzCMLF9wFcx@local-postgres:5432/check_and_visit_etl_db?sslmode=disable'
    ports:
      - '9187:9187'
    networks:
      - local-shared-network
    depends_on:
      - prometheus

networks:
  local-shared-network:
    external: true
