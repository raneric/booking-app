services:
  server:
    build: ./server
    networks:
      - local-shared-network
    ports:
      - '3000:3000'
      - '9229:9229'
    command: ['node', '--inspect=0.0.0.0:9229', 'src/server.js']
    env_file:
      - path: ./server/db.env
        required: true
    volumes:
      - ./server:/app

  client:
    build: ./client
    networks:
      - local-shared-network
    ports:
      - '5173:80'
    volumes:
      - ./client:/app
    depends_on:
      - server

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'

    ports:
      - '9090:9090'
    networks:
      - local-shared-network
    depends_on:
      - server

  postgres_exporter:
    image: prometheuscommunity/postgres-exporter
    container_name: postgres_exporter
    environment:
      DATA_SOURCE_NAME: 'postgresql://odoo_stocks:iloCGIdiMzCMLF9wFcx@local-postgres:5432/check_and_visit_etl_db?sslmode=disable'
    ports:
      - '9187:9187'
    networks:
      - local-shared-network
    depends_on:
      - prometheus

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - '3002:3000'
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-storage:/var/lib/grafana
    networks:
      - local-shared-network
    depends_on:
      - prometheus

networks:
  local-shared-network:
    external: true

volumes:
  grafana-storage:
