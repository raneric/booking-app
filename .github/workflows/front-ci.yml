name: booking-react-app-build
run-name: Build and Push Docker Image for booking-react-app
on:
  workflow_dispatch:

  pull_request:
    types: [closed]
    branches:
      - main
    paths:
      - 'client/package*.json'

jobs:
  check-deps-vulnerability:
    uses: ./.github/workflows/vulnerabilities-checker.yml
    with:
      working-directory: 'client'
      source: 'front-ci'

  build-push-react-app-image:
    needs: [check-deps-vulnerability]
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.title, 'Auto dependency fix'))

    uses: ./.github/workflows/build-login-push-image.yml
    with:
      image-repo: 'react-front'
      docker-context: './client'
      docker-file: './client/Dockerfile'
      build-args: |
        VITE_API_URL=${{ vars.API_ENDPOINT }}
    secrets:
      token: ${{ secrets.PAT_SECRET }}
