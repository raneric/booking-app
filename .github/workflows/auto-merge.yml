name: auto-merge dependency PR

on:
  pull_request:
    types: [opened]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: |
      contains(github.event.pull_request.title, 'Auto dependency fix')
    runs-on: ubuntu-latest
    steps:
      - name: Check mergeable state
        id: mergeable
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.payload.pull_request.number;
            const getPr = async () => github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            const { data: pr } = await getPr();
            const prData = pr.mergeable === null ? (await getPr()).data : pr;

            core.setOutput('mergeable', String(prData.mergeable));
            core.setOutput('mergeable_state', prData.mergeable_state);
            console.log(String(prData.mergeable));
